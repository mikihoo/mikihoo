<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>채음 — mikihoo</title>
  <meta name="description" content="mikihoo의 소리." />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 비주얼라이저 (1단계: 화면 전체, 배경만) -->
  <canvas id="visualizer"></canvas>

  <header class="site-header">
    <a href="index.html" class="site-title">mikihoo / 微氣候</a>
    <nav class="site-nav">
      <a href="index.html">수기록</a>
      <a href="weather.html">당신의 날씨</a>
      <a href="sound.html" class="active">채음</a>
      <a href="artists.html">채집자</a>
    </nav>
  </header>

  <main class="sound-main">

    <!-- 어드민 로그인 (admin 모드에서만 표시) -->
    <div id="soundAdminLogin" style="display:none; margin-bottom:2.5rem; padding-bottom:2.5rem; border-bottom:1px solid var(--border);">
      <div class="admin-label" style="margin-bottom:1rem;">관리자 로그인</div>
      <div class="form-field">
        <label for="sAdminEmail">이메일</label>
        <input type="email" id="sAdminEmail" autocomplete="username" />
      </div>
      <div class="form-field">
        <label for="sAdminPassword">비밀번호</label>
        <input type="password" id="sAdminPassword" autocomplete="current-password" />
      </div>
      <button class="btn-submit" id="sLoginBtn">로그인</button>
      <div class="form-status" id="sLoginStatus"></div>
    </div>

    <section class="sound-list-section" id="listSection">
      <div class="entries-label-row">
        <div class="entries-label">채음</div>
      </div>
      <div class="weather-filter" id="weatherFilter">
        <button class="wf-tab active" data-tag="all">전체</button>
        <button class="wf-tab" data-tag="01d">맑음</button>
        <button class="wf-tab" data-tag="10d">비</button>
        <button class="wf-tab" data-tag="13d">눈</button>
        <button class="wf-tab" data-tag="50d">안개</button>
        <button class="wf-tab" data-tag="wind">바람</button>
        <button class="wf-tab" data-tag="04d">흐림</button>
      </div>
<div class="track-list" id="trackList">
        <p class="entries-empty">아직 아무것도 없습니다.</p>
      </div>
    </section>

    <!-- 어드민 업로드 폼 (admin 모드에서만 표시) -->
    <section id="uploadSection" class="upload-section" style="display:none;">
      <div class="admin-label" id="uploadLabel">새 음원</div>
      <div class="form-field">
        <label for="trackTitle">곡 제목</label>
        <input type="text" id="trackTitle" />
      </div>
      <div class="form-field">
        <label for="trackArtist">아티스트 이름</label>
        <input type="text" id="trackArtist" placeholder="mikihoo" />
      </div>
      <div class="form-field">
        <label for="trackWeather">날씨 태그</label>
        <select id="trackWeather" class="form-select">
          <option value="01d">맑음</option>
          <option value="10d">비</option>
          <option value="13d">눈</option>
          <option value="50d">안개</option>
          <option value="wind">바람</option>
          <option value="04d">흐림</option>
        </select>
      </div>
      <div class="form-field">
        <label>파일 (mp3 / wav)</label>
        <label for="trackFile" class="file-label">파일 선택 —</label>
        <input type="file" id="trackFile" accept="audio/mpeg,audio/wav,audio/x-wav,audio/mp4,audio/x-m4a,.mp3,.wav,.m4a" />
        <div class="file-name" id="trackFileName"></div>
      </div>
      <div style="display:flex; gap:1rem; align-items:center; flex-wrap:wrap;">
        <button class="btn-submit" id="uploadBtn">업로드</button>
        <button class="btn-submit" id="uploadCancelBtn" style="display:none; border-color:var(--text-faint); color:var(--text-faint);">취소</button>
      </div>
      <div class="form-status" id="uploadStatus"></div>
    </section>

  </main>

  <footer class="site-footer">
    <span>mikihoo &copy; 2026</span>
  </footer>

  <!-- 하단 고정 플레이어 -->
  <div class="player-bar" id="playerBar">
    <div class="player-meta" id="playerMeta">
      <span class="player-track-title" id="playerTitle"></span>
      <span class="player-track-artist" id="playerArtist"></span>
    </div>
    <div class="player-controls">
      <button class="player-toggle" id="playToggle" aria-label="재생/일시정지">▶</button>
      <button class="player-repeat" id="repeatOneBtn" aria-label="한 곡 반복" title="한 곡 반복">↺&#xFE0E;<span style="font-size:0.65em; margin-left:1px;">1</span></button>
      <button class="player-repeat" id="repeatAllBtn" aria-label="전체 반복" title="전체 반복">↺&#xFE0E;</button>
    </div>
    <input type="range" class="player-seek" id="seekBar" min="0" max="1000" value="0" step="1" />
    <div class="player-time">
      <span id="curTime">0:00</span>
      <span class="player-time-sep">/</span>
      <span id="durTime">0:00</span>
    </div>
  </div>

  <audio id="audioEl" preload="metadata" crossorigin="anonymous"></audio>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="lenis-init.js"></script>
  <script type="module" src="sound.js"></script>
  <script src="grain.js"></script>
  <script src="header-particles.js"></script>
</body>
</html>
