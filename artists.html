<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아티스트 — mikihoo</title>
  <meta name="description" content="mikihoo와 함께하는 아티스트들." />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .artists-grid {
      display: grid;
      width: 100%;
    }

    .artist-card {
      position: relative;
      overflow: hidden;
      cursor: default;
    }

    .artist-card img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.2) brightness(0.75);
      transition: filter 0.6s ease;
    }

    .artist-card:hover img {
      filter: saturate(0.3) brightness(0.85);
    }

    .artist-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(10,10,8,0.85) 0%, rgba(10,10,8,0.2) 55%, transparent 100%);
    }

    .artist-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 2rem 2rem 2.4rem;
    }

    .artist-name {
      font-family: 'EB Garamond', serif;
      font-size: 1.7rem;
      font-weight: 400;
      color: #e8e4dc;
      letter-spacing: 0.02em;
      margin-bottom: 0.6rem;
    }

    .artist-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
    }

    .artist-link {
      font-family: 'EB Garamond', serif;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(200, 196, 188, 0.5);
      transition: color 0.6s ease;
      text-decoration: none;
    }

    .artist-link:hover {
      color: rgba(232, 228, 220, 0.85);
    }

    /* no-photo fallback */
    .artist-card.no-photo {
      background: #161613;
    }

    @media (max-width: 768px) {
      .artist-card {
        height: 60vh !important;
      }
      .artists-grid {
        grid-template-columns: 1fr !important;
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="site-title">mikihoo / 微氣候</a>
    <nav class="site-nav">
      <a href="index.html">아카이브</a>
      <a href="artists.html" class="active">아티스트</a>
      <a href="weather.html">당신의 날씨</a>
    </nav>
  </header>

  <div class="artists-grid" id="artistsGrid"></div>

  <footer class="site-footer">
    <span>mikihoo &copy; 2026</span>
    <a href="index.html?admin" class="footer-admin" style="display:none;">관리</a>
  </footer>

  <script>
    const artists = [
      { name: "", photo: "", links: [{ label: "", url: "" }] },
      { name: "", photo: "", links: [{ label: "", url: "" }] },
    ];

    const grid = document.getElementById('artistsGrid');
    const cols = Math.min(artists.length, 4);
    const height = artists.length <= 4 ? '100vh' : '60vh';

    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

    artists.forEach(artist => {
      const card = document.createElement('div');
      card.className = 'artist-card' + (artist.photo ? '' : ' no-photo');
      card.style.height = height;

      if (artist.photo) {
        const img = document.createElement('img');
        img.src = artist.photo;
        img.alt = artist.name;
        img.loading = 'lazy';
        card.appendChild(img);
      }

      const overlay = document.createElement('div');
      overlay.className = 'artist-overlay';
      card.appendChild(overlay);

      const info = document.createElement('div');
      info.className = 'artist-info';

      const name = document.createElement('div');
      name.className = 'artist-name';
      name.textContent = artist.name;
      info.appendChild(name);

      const linksEl = document.createElement('div');
      linksEl.className = 'artist-links';
      (artist.links || []).forEach(link => {
        if (!link.label && !link.url) return;
        const a = document.createElement('a');
        a.className = 'artist-link';
        a.href = link.url;
        a.textContent = link.label;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        linksEl.appendChild(a);
      });
      info.appendChild(linksEl);
      card.appendChild(info);

      grid.appendChild(card);
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="lenis-init.js"></script>
  <script src="grain.js"></script>
</body>
</html>
